version = 1

# Default: all Construct skills and tooling are GPL-3.0-or-later (software-class per
# Standard §4.1.1). "override" precedence so example SPDX headers embedded in skill prose
# (e.g. spacecraft-standard's §4.3 example) are not parsed as real license tags.
[[annotations]]
path = "**"
precedence = "override"
SPDX-FileCopyrightText = "2026 Mohamed Hammad <Mohamed.Hammad@SpacecraftSoftware.org>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Third-party-derived skill: Microsoft Pragmatic Rust Guidelines — upstream MIT (§4.2),
# dual-licensed GPL-3.0-or-later OR MIT by Spacecraft Software (MIT→GPL compatible; the
# MIT arm preserves Microsoft's notice). Covers the skill directory plus its packaged
# .skill / .zip artifacts at repo root.
[[annotations]]
path = ["microsoft-rust-guidelines/**", "microsoft-rust-guidelines.skill", "microsoft-rust-guidelines.zip"]
precedence = "override"
SPDX-FileCopyrightText = ["Microsoft Corporation", "2026 Mohamed Hammad <Mohamed.Hammad@SpacecraftSoftware.org>"]
SPDX-License-Identifier = "GPL-3.0-or-later OR MIT"

# Third-party-derived skill: GNU Coding Standards — upstream GFDL-1.3-or-later (§4.2).
[[annotations]]
path = ["gnu-coding-standards/**", "gnu-coding-standards.skill", "gnu-coding-standards.zip"]
precedence = "override"
SPDX-FileCopyrightText = "Free Software Foundation, Inc.; Spacecraft Software adaptation 2026 Mohamed Hammad"
SPDX-License-Identifier = "GFDL-1.3-or-later"

# Independent, distributable skill: gnu-free-software is free-standing free-software
# guidance authored by Mohamed Hammad — personal copyright, no Spacecraft branding (it
# restates FSF/GNU source in original prose; see its ATTRIBUTION.md / CREDITS.md). The
# override keeps its distribution metadata honest (not the @SpacecraftSoftware.org default).
[[annotations]]
path = ["gnu-free-software/**", "gnu-free-software.skill", "gnu-free-software.zip"]
precedence = "override"
SPDX-FileCopyrightText = "2026 Mohamed Hammad"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Idiom layer in spacecraft-rust-guidelines: distilled from Apollo GraphQL's Rust Best
# Practices (upstream MIT, §4.2) into Spacecraft Software's own GPL-3.0-or-later expression.
# Credit both rights-holders; the upstream MIT notice is preserved verbatim in
# references/ATTRIBUTION.md. (Only these two files derive from Apollo — the rest of the
# skill is original Spacecraft work covered by the default GPL annotation above.)
[[annotations]]
path = ["spacecraft-rust-guidelines/references/idioms.md", "spacecraft-rust-guidelines/references/ATTRIBUTION.md"]
precedence = "override"
SPDX-FileCopyrightText = ["2024 Apollo Graph, Inc.", "2026 Mohamed Hammad <Mohamed.Hammad@SpacecraftSoftware.org>"]
SPDX-License-Identifier = "GPL-3.0-or-later"

# Third-party-derived data: the construct CLI's agent registry is ported from
# vercel-labs/skills (src/agents.ts, MIT, © Vercel, Inc.). Dual-licensed
# GPL-3.0-or-later OR MIT by Spacecraft Software (the MIT arm preserves Vercel's
# notice; MIT→GPL compatible), §4.2. See construct-cli/CREDITS.md.
[[annotations]]
path = "construct-cli/registry/agents.toml"
precedence = "override"
SPDX-FileCopyrightText = ["Vercel, Inc.", "2026 Mohamed Hammad <Mohamed.Hammad@SpacecraftSoftware.org>"]
SPDX-License-Identifier = "GPL-3.0-or-later OR MIT"

# Third-party-vendored, unmodified: Google's Android skills (github:android/skills,
# Apache-2.0, © Google LLC). Vendored verbatim under android-skills/ — NOT adapted, so
# the upstream license is preserved as-is with no Spacecraft relicensing/dual-licensing
# (§4.2), unlike the adapted microsoft-rust / Apollo-idioms entries above. Single
# copyright holder, single license. See android-skills/CREDITS.md for provenance.
[[annotations]]
path = "android-skills/**"
precedence = "override"
SPDX-FileCopyrightText = "Google LLC"
SPDX-License-Identifier = "Apache-2.0"
