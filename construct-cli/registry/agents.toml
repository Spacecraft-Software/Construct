#
# Agent registry — the AI coding agents `construct` can install skills into. Each
# entry maps an agent id to its project-relative (`project_path`) and
# home-relative (`global_path`) skills directory. Embedded into the binary at
# compile time (see registry/mod.rs). Add an agent = append one [[agent]] table.
#
# `format` is "directory" (skills live at <path>/<name>/SKILL.md) or "flat"
# (SKILL.md at the path root, e.g. Grok). Agents with no `global_path` support
# only project-local installs.
#
# Derived from vercel-labs/skills (`src/agents.ts`, MIT) — see ../CREDITS.md and
# the REUSE.toml annotation. Home-relative defaults; the upstream's env-var
# overrides (CODEX_HOME, CLAUDE_CONFIG_DIR, XDG_CONFIG_HOME, …) are not modeled.

[[agent]]
id = "adal"
display_name = "AdaL"
project_path = ".adal/skills"
global_path = ".adal/skills"
format = "directory"

